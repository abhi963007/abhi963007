<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commit Runner: Bug Squasher 🎮</title>
  <!-- Retro Gaming Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="arcade-cabinet">
    <!-- Header Marquee -->
    <div class="marquee">
      <div class="marquee-text">COMMIT RUNNER</div>
      <div class="marquee-subtitle">BUG SQUASHER v1.0</div>
    </div>

    <!-- Arcade Screen -->
    <div class="screen-wrapper">
      <div class="crt-overlay"></div>
      
      <!-- Overlay Screen for Game States -->
      <div id="overlay-screen" class="overlay-active">
        <h1 id="overlay-title">PRESS START</h1>
        <p id="overlay-instructions">USE LEFT/RIGHT ARROWS TO RUN<br>SPACEBAR TO JUMP</p>
        <button id="start-btn">INSERT COIN</button>
      </div>

      <!-- Live Dashboard -->
      <div class="game-hud">
        <div class="hud-item">
          <span>SCORE</span>
          <span id="score-display">000000</span>
        </div>
        <div class="hud-item">
          <span>COINS</span>
          <span id="coins-display">x00</span>
        </div>
        <div class="hud-item">
          <span>LIVES</span>
          <span id="lives-display">❤️❤️❤️</span>
        </div>
      </div>

      <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <!-- Mobile Virtual Controls (Hidden on Desktop) -->
    <div class="controls-panel">
      <div class="dpad">
        <button id="btn-left" class="control-btn">◀</button>
        <button id="btn-right" class="control-btn">▶</button>
      </div>
      <div class="action-buttons">
        <button id="btn-jump" class="control-btn action-btn">JUMP</button>
      </div>
    </div>

    <!-- Arcade Controls Mock Footer -->
    <div class="arcade-footer">
      <div class="joystick-mock">
        <div class="base"></div>
        <div class="stick"></div>
      </div>
      <div class="buttons-mock">
        <span class="btn red"></span>
        <span class="btn yellow"></span>
        <span class="btn blue"></span>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
